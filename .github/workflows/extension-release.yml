name: extension-release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish built VSIX to VS Code Marketplace and Open VSX"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-binaries:
    name: build-${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x64
            os: windows-latest
            source: target/release/dmn.exe
            output: dmn-win32-x64.exe
          - id: linux-x64
            os: ubuntu-latest
            source: target/release/dmn
            output: dmn-linux-x64
          - id: linux-arm64
            os: ubuntu-24.04-arm
            source: target/release/dmn
            output: dmn-linux-arm64
          - id: macos-x64
            os: macos-15-intel
            source: target/release/dmn
            output: dmn-darwin-x64
          - id: macos-arm64
            os: macos-14
            source: target/release/dmn
            output: dmn-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build dmn binary
        shell: bash
        run: cargo build --release --package dmn-core

      - name: Export binary artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.source }}" "dist/${{ matrix.output }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          if-no-files-found: error

  package-vsix:
    name: package-vsix
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Ensure Unix binaries are executable
        run: |
          chmod +x dist/dmn-linux-x64
          chmod +x dist/dmn-linux-arm64
          chmod +x dist/dmn-darwin-x64
          chmod +x dist/dmn-darwin-arm64

      - name: Remove stale VSIX files
        run: rm -f dist/*.vsix

      - name: Package extension
        run: bash ./scripts/package-extension.sh

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: dist/*.vsix
          if-no-files-found: error

  publish:
    name: publish-marketplaces
    runs-on: ubuntu-latest
    needs: package-vsix
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-vsix
          path: dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate publish secrets
        run: |
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "VSCE_PAT secret is required for publishing."
            exit 1
          fi
          if [ -z "${{ secrets.OVSX_PAT }}" ]; then
            echo "OVSX_PAT secret is required for publishing."
            exit 1
          fi

      - name: Install publish CLIs
        run: npm install -g @vscode/vsce ovsx

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VSIX_PATH="$(ls -t dist/*.vsix | head -n 1)"
          vsce publish --packagePath "$VSIX_PATH" -p "$VSCE_PAT"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          VSIX_PATH="$(ls -t dist/*.vsix | head -n 1)"
          ovsx publish "$VSIX_PATH" -p "$OVSX_PAT"

  create-github-release:
    name: create-github-release
    runs-on: ubuntu-latest
    needs:
      - package-vsix
      - publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-vsix
          path: dist

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VSIX_PATH="$(ls -t dist/*.vsix | head -n 1)"
          if [ -z "$VSIX_PATH" ]; then
            echo "VSIX artifact not found."
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$VSIX_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$VSIX_PATH" \
              --title "OpenDaemon $TAG_NAME" \
              --notes "Automated extension release for $TAG_NAME."
          fi
